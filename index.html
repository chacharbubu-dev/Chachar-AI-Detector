<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Chachar AI Detector 🧸</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Itim', 'Sarabun', sans-serif;
            background-color: #ffeef2;
            overflow-x: hidden;
        }
        /* CSS สำหรับกลีบดอกไม้ร่วง */
        .cherry-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99;
        }
        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 150px 0px 150px 150px;
            opacity: 0.8;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
        /* เมาส์เอฟเฟกต์วิ้งค์ๆ ตัวแม่ */
        .sparkle {
            position: absolute;
            pointer-events: none;
            background: transparent;
            animation: sparkleAnim 0.8s linear forwards;
            z-index: 9999;
            font-size: 14px;
        }
        @keyframes sparkleAnim {
            0% { transform: translate(-50%, -50%) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -100%) scale(1.5) rotate(180deg); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8">

    <div class="cherry-container" id="petal-container"></div>

    <div class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start relative z-10 my-auto">
        
        <div class="lg:col-span-5 bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-pink-100 flex flex-col gap-4">
            <div class="text-center relative">
                <span class="absolute -top-4 -left-2 text-3xl">🧸</span>
                <span class="absolute -top-4 -right-2 text-3xl">🎀</span>
                <h1 class="text-2xl font-bold text-pink-600 tracking-wide">Chachar AI Detector</h1>
                <p class="text-xs text-pink-400 mt-1">กล้องสแตนด์บายอัตโนมัติ กดปุ่มด้านล่างเพื่อเริ่มทำนายผล</p>
            </div>

            <div class="relative bg-pink-50/50 rounded-2xl overflow-hidden aspect-square flex items-center justify-center border-4 border-pink-200 shadow-inner">
                <div id="webcam-container" class="w-full h-full [&>canvas]:w-full [&>canvas]:h-full [&>canvas]:object-cover"></div>
                <div id="loading-status" class="absolute inset-0 bg-white/80 flex flex-col items-center justify-center text-pink-500 font-medium gap-2">
                    <span class="animate-bounce text-4xl">🧸</span>
                    <p id="status-text" class="text-sm">กำลังเปิดระบบกล้องแคม...</p>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-start" onclick="startPredict()" class="cursor-pointer bg-emerald-400 hover:bg-emerald-500 text-white font-medium py-2.5 rounded-xl transition-all shadow-md active:scale-95 disabled:opacity-50">
                        ▶️ Start Predict
                    </button>
                    <button id="btn-stop" onclick="stopPredict()" class="cursor-pointer bg-rose-400 hover:bg-rose-500 text-white font-medium py-2.5 rounded-xl transition-all shadow-md active:scale-95 disabled:opacity-50">
                        ⏹️ Stop Predict
                    </button>
                </div>
                <button id="btn-flip" onclick="flipCamera()" class="cursor-pointer bg-blue-400 hover:bg-blue-500 text-white font-medium py-2 rounded-xl transition-all shadow-md active:scale-95 text-sm flex items-center justify-center gap-1">
                    🔄 สลับกล้องหน้า / หลัง (Flip Camera)
                </button>
            </div>

            <div class="bg-pink-50/40 p-4 rounded-xl border border-pink-100 space-y-3" id="label-container">
                <div class="text-center text-xs text-pink-300 py-2">รอการเปิดใช้งานสแกน...</div>
            </div>
        </div>

        <div class="lg:col-span-7 bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-pink-100 h-full flex flex-col min-h-[500px]">
            <div class="flex justify-between items-center border-b border-pink-100 pb-3 mb-4">
                <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
                    <span>📸</span> ประวัติการตรวจจับวัตถุ (>90%)
                </h2>
                <button onclick="clearHistory()" class="cursor-pointer text-xs text-rose-400 hover:text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition-colors">
                    ล้างประวัติทั้งหมด
                </button>
            </div>

            <div id="history-list" class="space-y-3 overflow-y-auto max-h-[460px] flex-1 pr-1 text-sm text-slate-400 text-center py-12">
                ยังไม่มีการบันทึกประวัติข้อมูลในตอนนี้...
            </div>
        </div>

    </div>

    <footer class="text-center text-xs text-pink-400/70 mt-6 z-10">
        🎀 Chachar AI Showcase &copy; 2026 • Optimized for Mobile & iPad
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // ลิงก์โมเดลจาก Teachable Machine ของคุณ
        const URL = "https://teachablemachine.withgoogle.com/models/9Ok3h-hIS/";

        let model, webcam, labelContainer, maxPredictions;
        let isPredicting = false;
        let useFacingMode = "user"; // "user" = กล้องหน้า, "environment" = กล้องหลัง
        let lastCapturedClass = ""; 
        let lastCaptureTime = 0;

        // เรียกทำงานทันทีเมื่อเปิดเว็บ
        window.addEventListener('DOMContentLoaded', () => {
            createPetals();
            initAI();
            setupMouseTrail();
        });

        // 🌸 ระบบโปรยกลีบดอกไม้ซากุระ
        function createPetals() {
            const container = document.getElementById('petal-container');
            const petalCount = 25; 
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 12 + 8 + 'px';
                petal.style.height = Math.random() * 12 + 8 + 'px';
                petal.style.animationDuration = Math.random() * 5 + 5 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }

        // ✨ ระบบ Mouse Trail วิ้งค์ๆ ยามขยับเมาส์
        function setupMouseTrail() {
            const symbols = ['✨', '💖', '⭐', '🎀'];
            window.addEventListener('mousemove', (e) => {
                if (Math.random() > 0.15) return; 
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                sparkle.style.left = e.pageX + 'px';
                sparkle.style.top = e.pageY + 'px';
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 800);
            });
        }

        // 📷 โหลดโมเดลและเปิดกล้องแคมรอไว้เสมอ (แต่ยังไม่ Predict)
        async function initAI() {
            try {
                await tf.setBackend('webgl');
                await tf.ready();

                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // สั่งรันเปิดกล้องแคม
                await setupWebcam();

                // ซ่อนหน้าจอ Loading
                document.getElementById("loading-status").classList.add("hidden");
                
                // สร้างกล่องแถบแสดงคะแนนความมั่นใจรอไว้
                buildLabelUI();
                renderHistory();

                // 🛑 ตั้งค่าเริ่มต้นให้พร้อมทำงาน แต่กดเป็นสถานะ Stop/Paused ไว้ตั้งแต่เริ่มเว็บ
                stopPredict();

            } catch (error) {
                console.error(error);
                document.getElementById("status-text").innerText = "เกิดข้อผิดพลาดในการโหลดโมเดลหรือสิทธิ์เข้าถึงกล้อง";
            }
        }

        // ฟังก์ชัน Setup กล้องแคมที่รองรับการสลับหน้า-หลัง
        async function setupWebcam() {
            if (webcam && webcam.webcam) {
                webcam.stop();
            }

            const flip = (useFacingMode === "user");
            webcam = new tmImage.Webcam(250, 250, flip);
            
            await webcam.setup({ facingMode: useFacingMode }); 
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
        }

        // 🔄 ฟังก์ชันสลับกล้องหน้า-หลัง (Flip Camera)
        async function flipCamera() {
            document.getElementById("loading-status").classList.remove("hidden");
            document.getElementById("status-text").innerText = "กำลังสลับกล้องแคม...";
            
            useFacingMode = (useFacingMode === "user") ? "environment" : "user";
            
            await setupWebcam();
            document.getElementById("loading-status").classList.add("hidden");
        }

        function buildLabelUI() {
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "flex flex-col gap-1";
                row.innerHTML = `
                    <div class="flex justify-between text-xs font-semibold text-slate-600">
                        <span id="txt-class-${i}">รอกดเริ่มทำงาน...</span>
                        <span id="txt-score-${i}" class="text-pink-500">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="bar-score-${i}" class="bg-pink-400 h-full w-0 transition-all duration-700"></div>
                    </div>
                `;
                labelContainer.appendChild(row);
            }
        }

        // วนลูปวิดีโอแคมให้ทำงานตลอดเวลาไม่มีหยุด
        function webcamLoop() {
            if (webcam) {
                webcam.update();
            }
            window.requestAnimationFrame(webcamLoop);
        }
        window.requestAnimationFrame(webcamLoop);

        // ▶️ เริ่มรันทำนายผล AI
        function startPredict() {
            isPredicting = true;
            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-stop").disabled = false;
            predictLoop();
        }

        // ⏹️ หยุดรันทำนายผล AI (แต่ตัวภาพกล้องแคมยังขยับได้ปกติ)
        function stopPredict() {
            isPredicting = false;
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
        }

        // ลูปดักรอคำนวณผลลัพธ์
        async function predictLoop() {
            if (!isPredicting) return;
            await predict();
            setTimeout(() => {
                window.requestAnimationFrame(predictLoop);
            }, 100); 
        }

        async function predict() {
            if (!webcam || !model) return;
            const prediction = await model.predict(webcam.canvas);
            const now = Date.now();

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0);

                document.getElementById(`txt-class-${i}`).innerText = className;
                document.getElementById(`txt-score-${i}`).innerText = percentage + "%";
                document.getElementById(`bar-score-${i}`).style.width = percentage + "%";

                // เงื่อนไข Auto Capture เมื่อความมั่นใจเกิน 90%
                if (probability > 0.90 && (className !== lastCapturedClass || now - lastCaptureTime > 4000)) {
                    triggerCapture(className, percentage);
                    lastCapturedClass = className;
                    lastCaptureTime = now;
                }
            }
        }

        function triggerCapture(className, score) {
            playBeep();
            const imageDataUrl = webcam.canvas.toDataURL('image/jpeg', 0.6);
            const timeString = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const historyItem = {
                id: Date.now(),
                className: className,
                score: score,
                image: imageDataUrl,
                time: timeString
            };

            let currentHistory = JSON.parse(localStorage.getItem("ai_history")) || [];
            currentHistory.unshift(historyItem);
            localStorage.setItem("ai_history", JSON.stringify(currentHistory));

            renderHistory();
        }

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) { }
        }

        function renderHistory() {
            const historyList = document.getElementById("history-list");
            const currentHistory = JSON.parse(localStorage.getItem("ai_history")) || [];

            if (currentHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="text-center py-12 text-pink-300">
                        <div class="text-4xl mb-2">🧸</div>
                        ยังไม่มีการบันทึกประวัติข้อมูลในตอนนี้...
                    </div>`;
                return;
            }

            historyList.innerHTML = "";
            currentHistory.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-pink-50/50 hover:bg-pink-50 p-3 rounded-2xl flex items-center gap-4 border border-pink-100 transition-all shadow-xs";
                card.innerHTML = `
                    <img src="${item.image}" class="w-16 h-16 object-cover rounded-xl border-2 border-white shadow-sm flex-shrink-0" />
                    <div class="flex-1 text-left">
                        <div class="font-bold text-slate-700 text-base capitalize">✨ ${item.className}</div>
                        <div class="text-xs text-slate-400 mt-0.5">เวลาตรวจเจอ: ${item.time} น.</div>
                    </div>
                    <div class="text-right">
                        <span class="bg-emerald-100 text-emerald-600 text-xs font-bold px-2.5 py-1 rounded-full border border-emerald-200">
                            🔥 ${item.score}%
                        </span>
                    </div>
                `;
                historyList.appendChild(card);
            });
        }

        function clearHistory() {
            localStorage.removeItem("ai_history");
            renderHistory();
        }
    </script>
</body>
</html>
