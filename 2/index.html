<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Chachar AI Detector 🧸</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Itim', 'Sarabun', sans-serif;
            background-color: #ffeef2;
            overflow-x: hidden;
        }
        .cherry-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99;
        }
        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 150px 0px 150px 150px;
            opacity: 0.8;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
        .sparkle {
            position: absolute;
            pointer-events: none;
            background: transparent;
            animation: sparkleAnim 0.8s linear forwards;
            z-index: 9999;
            font-size: 14px;
        }
        @keyframes sparkleAnim {
            0% { transform: translate(-50%, -50%) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -100%) scale(1.5) rotate(180deg); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8">

    <div class="cherry-container" id="petal-container"></div>

    <div class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start relative z-10 my-auto">
        
        <div class="lg:col-span-5 bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-pink-100 flex flex-col gap-4">
            <div class="text-center relative">
                <span class="absolute -top-4 -left-2 text-3xl">🧸</span>
                <span class="absolute -top-4 -right-2 text-3xl">🎀</span>
                <h1 class="text-2xl font-bold text-pink-600 tracking-wide">🌸 Chachar AI Detector 🌸</h1>
                <p class="text-xs text-pink-400 mt-1">กล้องสแตนด์บายอัตโนมัติ กดปุ่มด้านล่างเพื่อเริ่มทำนายผล</p>
            </div>

            <div class="relative bg-pink-50/50 rounded-2xl overflow-hidden aspect-square flex items-center justify-center border-4 border-pink-200 shadow-inner">
                <div id="webcam-container" class="w-full h-full [&>canvas]:w-full [&>canvas]:h-full [&>canvas]:object-cover"></div>
                <div id="loading-status" class="absolute inset-0 bg-white/80 flex flex-col items-center justify-center text-pink-500 font-medium gap-2">
                    <span class="animate-bounce text-4xl">🧸</span>
                    <p id="status-text" class="text-sm">กำลังเปิดระบบกล้องแคม...</p>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-start" onclick="startPredict()" class="cursor-pointer bg-emerald-400 hover:bg-emerald-500 text-white font-medium py-2.5 rounded-xl transition-all shadow-md active:scale-95 disabled:opacity-50">
                        ▶️ Start
                    </button>
                    <button id="btn-stop" onclick="stopPredict()" class="cursor-pointer bg-rose-400 hover:bg-rose-500 text-white font-medium py-2.5 rounded-xl transition-all shadow-md active:scale-95 disabled:opacity-50">
                        ⏹️ Stop
                    </button>
                </div>
                <button id="btn-flip" onclick="flipCamera()" class="cursor-pointer bg-blue-400 hover:bg-blue-500 text-white font-medium py-2 rounded-xl transition-all shadow-md active:scale-95 text-sm flex items-center justify-center gap-1">
                    🔄 สลับกล้องหน้า / หลัง (Flip Camera)
                </button>
            </div>

            <div class="bg-pink-50/40 p-4 rounded-2xl border border-pink-100/70" id="label-container"></div>
        </div>

        <div class="lg:col-span-7 bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-pink-100 h-full flex flex-col min-h-[500px]">
            <div class="flex justify-between items-center border-b border-pink-100 pb-3 mb-4">
                <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
                    <span>📷</span> Detection History (>90%)
                </h2>
                <button onclick="clearHistory()" class="cursor-pointer text-xs text-rose-400 hover:text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition-colors">
                    ล้างประวัติทั้งหมด
                </button>
            </div>

            <div id="history-list" class="space-y-3 overflow-y-auto max-h-[460px] flex-1 pr-1 text-sm text-slate-400 text-center py-12">
                ยังไม่มีการบันทึกประวัติข้อมูลในตอนนี้...
            </div>
        </div>

    </div>

    <footer class="text-center text-xs text-pink-400/70 mt-6 z-10">
        🎀 Chachar AI Showcase &copy; 2026 • Optimized for Mobile & iPad
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // ลิงก์โมเดลอัปเดตตามที่คุณแจ้งเรียบร้อยครับ
        const URL = "https://teachablemachine.withgoogle.com/models/9Ok3h-hIS/";

        let model, webcam, labelContainer, maxPredictions;
        let isPredicting = false;
        let useFacingMode = "user"; 
        let lastCapturedClass = ""; 
        let lastCaptureTime = 0;
        let classListNames = []; 

        let activeDetectedClass = ""; 
        let consecFramesNotDetected = 0; 

        window.addEventListener('DOMContentLoaded', () => {
            createPetals();
            initAI();
            setupMouseTrail();
        });

        function createPetals() {
            const container = document.getElementById('petal-container');
            const petalCount = 15; // ปรับลดจำนวนกลีบลงเล็กน้อยเพื่อประหยัด RAM บนมือถือ
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 10 + 8 + 'px';
                petal.style.height = Math.random() * 10 + 8 + 'px';
                petal.style.animationDuration = Math.random() * 5 + 5 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }

        function setupMouseTrail() {
            const symbols = ['✨', '💖', '⭐', '🎀'];
            window.addEventListener('mousemove', (e) => {
                if (Math.random() > 0.3) return; // เพิ่มอัตราการข้ามเพื่อลดภาระ CPU ของการเคลื่อนเมาส์
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                sparkle.style.left = e.pageX + 'px';
                sparkle.style.top = e.pageY + 'px';
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 600);
            });
        }

        async function initAI() {
            try {
                // บังคับสลับโหมดประมวลผลเป็น WebGL เพื่อดึงพลังการ์ดจอมาใช้ (เปิดหน้าเว็บเร็วขึ้น)
                await tf.setBackend('webgl');
                await tf.ready();

                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                classListNames = model.getClassLabels();

                await setupWebcam();
                
                // Warm-up Model เพื่อเตรียมระบบตรวจจับล่วงหน้า ลดความล่าช้า (Lag) ตอนเฟรมแรก
                if(webcam && webcam.canvas) {
                    await model.predict(webcam.canvas);
                }

                document.getElementById("loading-status").classList.add("hidden");
                
                buildLabelUI();
                renderHistory();
                stopPredict();

            } catch (error) {
                console.error(error);
                // สลับไปใช้ CPU สำรองอัตโนมัติหากอุปกรณ์รุ่นเก่าไม่รองรับ WebGL
                try {
                    await tf.setBackend('cpu');
                    model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                    maxPredictions = model.getTotalClasses();
                    classListNames = model.getClassLabels();
                    await setupWebcam();
                    document.getElementById("loading-status").classList.add("hidden");
                    buildLabelUI();
                    renderHistory();
                    stopPredict();
                } catch(e) {
                    document.getElementById("status-text").innerText = "เกิดข้อผิดพลาดในการโหลดระบบหรือสิทธิ์เข้าถึงกล้อง";
                }
            }
        }

        async function setupWebcam() {
            if (webcam && webcam.webcam) {
                webcam.stop();
            }
            const flip = (useFacingMode === "user");
            // จำกัดขนาดกล้องให้สอดคล้องกับขนาดโครงข่ายประสาทเทียมเพื่อประหยัดแรงเครื่อง
            webcam = new tmImage.Webcam(224, 224, flip);
            await webcam.setup({ facingMode: useFacingMode }); 
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
        }

        async function flipCamera() {
            document.getElementById("loading-status").classList.remove("hidden");
            document.getElementById("status-text").innerText = "กำลังสลับกล้องแคม...";
            useFacingMode = (useFacingMode === "user") ? "environment" : "user";
            await setupWebcam();
            document.getElementById("loading-status").classList.add("hidden");
        }

        function buildLabelUI() {
            labelContainer = document.getElementById("label-container");
            
            let itemsBadgeHTML = classListNames.map(name => 
                `<span class="bg-white/80 border border-pink-100 text-slate-600 text-xs px-2.5 py-1 rounded-full font-medium capitalize shadow-2xs">🍭 ${name}</span>`
            ).join('');

            labelContainer.innerHTML = `
                <div id="default-info-view" class="flex flex-col gap-3 py-2">
                    <div class="text-xs font-bold text-pink-500 flex items-center gap-1 px-1">
                        ✨ วัตถุที่ระบบสามารถสแกนได้ (${maxPredictions} ชิ้น):
                    </div>
                    <div class="flex flex-wrap gap-2 justify-center">
                        ${itemsBadgeHTML}
                    </div>
                    <div class="text-[11px] text-slate-400 text-center mt-1 animate-pulse">
                        นำวัตถุข้างต้นมาส่องหน้ากล้องเพื่อสแกนผลได้เลย...
                    </div>
                </div>
            `;
            activeDetectedClass = "";
        }

        function webcamLoop() {
            if (webcam && isPredicting === false) {
                webcam.update(); // อัปเดตเฟรมปกติเมื่อไม่ได้รันโหมดตรวจจับผล
            }
            window.requestAnimationFrame(webcamLoop);
        }
        window.requestAnimationFrame(webcamLoop);

        function startPredict() {
            isPredicting = true;
            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-stop").disabled = false;
            predictLoop();
        }

        function stopPredict() {
            isPredicting = false;
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            buildLabelUI(); 
        }

        async function predictLoop() {
            if (!isPredicting) return;
            
            // ใช้ tf.tidy เพื่อเคลียร์หน่วยความจำแคชของภาพใน TensorFlow ออกทันที ป้องกันอาการเบราว์เซอร์ค้าง
            await tf.tidy(async () => {
                if (webcam) webcam.update();
                await predict();
            });

            // เพิ่มดีเลย์เล็กน้อย (70ms) เพื่อป้องกันการหน่วงสะสมและไม่ให้เครื่องร้อนเร็วเกินไป
            setTimeout(() => {
                window.requestAnimationFrame(predictLoop);
            }, 70); 
        }

        async function predict() {
            if (!webcam || !model) return;
            const prediction = await model.predict(webcam.canvas);
            const now = Date.now();

            let highestPred = { className: "", probability: 0 };
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestPred.probability) {
                    highestPred = prediction[i];
                }
            }

            const currentPercentage = (highestPred.probability * 100).toFixed(0);

            if (highestPred.probability > 0.85) {
                consecFramesNotDetected = 0;
                activeDetectedClass = highestPred.className;

                labelContainer.innerHTML = `
                    <div class="bg-gradient-to-br from-white to-pink-50/30 p-4 rounded-xl border border-pink-200 shadow-md flex flex-col gap-3">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-pink-600 flex items-center gap-1.5">
                                <span class="animate-bounce text-base">🎉</span> ตรวจพบวัตถุ!
                            </span>
                            <span class="text-xs bg-pink-100 text-pink-600 font-bold px-2.5 py-0.5 rounded-full border border-pink-200">
                                Confidence: ${currentPercentage}%
                            </span>
                        </div>
                        <div class="text-2xl font-black text-slate-800 text-center tracking-wide py-1 border-b border-pink-100/50 capitalize">
                            ✨ ${highestPred.className} ✨
                        </div>
                        <div class="w-full bg-pink-100/40 h-2.5 rounded-full overflow-hidden border border-pink-100/30 shadow-inner">
                            <div class="bg-gradient-to-r from-emerald-400 to-pink-500 h-full rounded-full shadow-md transition-all duration-200" style="width: ${currentPercentage}%"></div>
                        </div>
                    </div>
                `;

                if (highestPred.probability > 0.90 && (highestPred.className !== lastCapturedClass || now - lastCaptureTime > 4000)) {
                    triggerCapture(highestPred.className, currentPercentage);
                    lastCapturedClass = highestPred.className;
                    lastCaptureTime = now;
                }
            } else {
                consecFramesNotDetected++;
                if (consecFramesNotDetected > 4 || activeDetectedClass === "") {
                    buildLabelUI();
                }
            }
        }

        function triggerCapture(className, score) {
            playBeep();
            const imageDataUrl = webcam.canvas.toDataURL('image/jpeg', 0.5); // บีบอัดขนาดไฟล์รูปภาพประวัติลงเล็กน้อยเพื่อประหยัดความเร็ว
            const timeString = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const historyItem = {
                id: Date.now(),
                className: className,
                score: score,
                image: imageDataUrl,
                time: timeString
            };

            let currentHistory = JSON.parse(localStorage.getItem("ai_history")) || [];
            currentHistory.unshift(historyItem);
            localStorage.setItem("ai_history", JSON.stringify(currentHistory));

            renderHistory();
        }

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) { }
        }

        function renderHistory() {
            const historyList = document.getElementById("history-list");
            const currentHistory = JSON.parse(localStorage.getItem("ai_history")) || [];

            if (currentHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="text-center py-12 text-pink-300">
                        <div class="text-4xl mb-2">🧸</div>
                        ยังไม่มีการบันทึกประวัติข้อมูลในตอนนี้...
                    </div>`;
                return;
            }

            historyList.innerHTML = "";
            currentHistory.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-pink-50/50 hover:bg-pink-50 p-3 rounded-2xl flex items-center gap-4 border border-pink-100 transition-all shadow-xs";
                card.innerHTML = `
                    <img src="${item.image}" class="w-16 h-16 object-cover rounded-xl border-2 border-white shadow-sm flex-shrink-0" />
                    <div class="flex-1 text-left">
                        <div class="font-bold text-slate-700 text-base capitalize">✨ ${item.className}</div>
                        <div class="text-xs text-slate-400 mt-0.5">${item.time}</div>
                    </div>
                    <div class="text-right">
                        <span class="bg-emerald-100 text-emerald-600 text-xs font-bold px-2.5 py-1 rounded-full border border-emerald-200">
                            🔥 ${item.score}%
                        </span>
                    </div>
                `;
                historyList.appendChild(card);
            });
        }

        function clearHistory() {
            localStorage.removeItem("ai_history");
            renderHistory();
        }
    </script>
</body>
</html>
